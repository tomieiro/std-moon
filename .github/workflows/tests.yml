name: Tests

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Lua
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.4

      - name: Check syntax
        run: |
          luac -p data_structures/*.lua
          luac -p algorithms/*.lua
          find testing -name "*.lua" -print0 | xargs -0 -n1 luac -p

      - name: Run tests
        run: |
          lua testing/run.lua
